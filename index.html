<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>을지맛지도</title>
<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=2428303d695d8ec2dca4acbe232ee049&autoload=false"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --green:#2D6A2F; --green2:#1E4D20; --green-lt:#EBF4EB;
      --yellow:#F5C842; --yellow2:#E6B800;
      --text:#1A2E1A; --muted:#6B8F6B; --border:#D4E8D4;
      --white:#FFFFFF; --bg:#F4FAF4;
      --shadow:0 2px 16px rgba(45,106,47,0.10); --r:14px;
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden}
    body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(245,200,66,0.07) 1px,transparent 1px);background-size:20px 20px;pointer-events:none;z-index:0}

    /* SPLASH */
    .splash{position:fixed;inset:0;background:var(--green);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;transition:opacity 0.5s}
    .splash.hide{opacity:0;pointer-events:none}
    .splash-icon{font-size:72px;animation:float 1.8s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    .splash-title{font-size:22px;font-weight:900;color:var(--yellow)}
    .splash-sub{font-size:13px;color:rgba(255,255,255,0.5)}
    .splash-bar{width:100px;height:3px;background:rgba(255,255,255,0.15);border-radius:2px;margin-top:6px;overflow:hidden}
    .splash-prog{height:100%;background:var(--yellow);border-radius:2px;animation:prog 1.5s ease-in-out forwards}
    @keyframes prog{from{width:0}to{width:100%}}

    /* HEADER */
    .header{background:var(--green);padding:max(env(safe-area-inset-top),14px) 16px 0;flex-shrink:0;position:relative;z-index:10}
    .hdr-top{display:flex;align-items:center;justify-content:space-between;padding-bottom:11px}
    .hdr-logo{display:flex;align-items:center;gap:8px}
    .hdr-icon{width:32px;height:32px;background:var(--yellow);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px}
    .hdr-title{font-size:17px;font-weight:900;color:var(--yellow)}
    .hdr-count{font-size:11px;color:rgba(255,255,255,0.5);margin-left:4px}
    .hdr-btn{width:32px;height:32px;border:none;background:rgba(255,255,255,0.12);border-radius:8px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
    .search-wrap{position:relative;margin-bottom:10px}
    /* 필터 한 줄 (라벨 + 칩들) */
    .filter-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:8px;align-items:center;flex-wrap:nowrap}
    .filter-row::-webkit-scrollbar{display:none}
    .filter-row-label{font-size:11px;color:rgba(255,255,255,0.85);font-weight:700;flex-shrink:0;margin-right:4px;white-space:nowrap;display:inline-flex;align-items:center;gap:3px}
    /* 다중선택 칩 (카테고리/분위기) - 노란색으로 선택 표시 */
    .mood-chip-btn{flex-shrink:0;padding:5px 13px;border-radius:100px;border:1.5px solid rgba(255,255,255,0.25);background:rgba(255,255,255,0.1);font-size:12px;font-weight:600;color:rgba(255,255,255,0.85);cursor:pointer;white-space:nowrap;font-family:inherit;transition:all 0.15s}
    .mood-chip-btn:active{transform:scale(0.96)}
    .mood-chip-btn.active{background:var(--yellow);border-color:var(--yellow);color:var(--green2);font-weight:800}
    /* 필터 초기화 버튼 */
    .filter-reset-row{display:flex;justify-content:flex-end;padding:2px 0 8px}
    .filter-reset-btn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);color:white;font-size:11px;font-weight:700;padding:5px 11px;border-radius:100px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:3px;transition:all 0.15s}
    .filter-reset-btn:hover{background:rgba(255,255,255,0.25)}
    .filter-reset-btn:active{transform:scale(0.96)}
    .half-star{color:var(--yellow2);font-weight:900}
    .card-r2 .mood-tag{display:inline-block;padding:1px 7px;background:var(--green-lt);color:var(--green);border-radius:100px;font-size:10px;font-weight:700;margin-right:3px}
    .card-r2 .time-tag{display:inline-block;padding:1px 7px;background:#FFF4D6;color:#8A6500;border-radius:100px;font-size:10px;font-weight:700;margin-right:3px}

    .search-input{width:100%;padding:8px 14px 8px 34px;border:none;border-radius:10px;font-size:13px;font-family:inherit;background:rgba(255,255,255,0.15);color:white;outline:none}
    .search-input::placeholder{color:rgba(255,255,255,0.5)}
    .search-input:focus{background:rgba(255,255,255,0.25)}
    .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}
    .search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:14px;cursor:pointer;display:none;background:none;border:none;color:rgba(255,255,255,0.7)}
    .filter-scroll{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:12px}
    .filter-scroll::-webkit-scrollbar{display:none}
    .chip{flex-shrink:0;padding:5px 13px;border-radius:100px;border:1.5px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.1);font-size:12px;font-weight:600;color:rgba(255,255,255,0.75);cursor:pointer;transition:all 0.18s;white-space:nowrap}
    .chip.active{background:var(--yellow);border-color:var(--yellow);color:var(--green2);font-weight:800}

    /* MAIN */
    .main{flex:1;overflow:hidden;position:relative;z-index:1}
    #map-view{width:100%;height:100%;position:relative}
    #leaflet-map{width:100%;height:100%}
    #list-view,#fav-view{height:100%;overflow-y:auto;padding:14px;display:none;flex-direction:column;gap:9px}
    
    #list-view.active,#fav-view.active{display:flex}

    /* Leaflet 핀 커스텀 */
    .map-pin{position:relative;background:white;border:2.5px solid #2D6A2F;border-radius:16px;padding:5px 10px 5px 8px;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:800;color:#1A2E1A;box-shadow:0 3px 12px rgba(0,0,0,0.25);display:inline-flex;align-items:center;gap:4px;white-space:nowrap;cursor:pointer;line-height:1}.map-pin::after{content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);border:8px solid transparent;border-top-color:#2D6A2F;border-bottom:0}.pin-emoji{font-size:14px;line-height:1;vertical-align:middle;display:inline-block;margin-top:-1px}.pin-name{font-size:11px;font-weight:800;color:#1A2E1A;-webkit-text-stroke:3px white;paint-order:stroke fill}.pin-stars{font-size:10px;color:#E6B800;-webkit-text-stroke:2px white;paint-order:stroke fill}
    .pin-stars{color:var(--yellow);font-size:10px;letter-spacing:-1px;text-shadow:-1px -1px 0 rgba(0,0,0,0.6),1px -1px 0 rgba(0,0,0,0.6),-1px 1px 0 rgba(0,0,0,0.6),1px 1px 0 rgba(0,0,0,0.6)}
    .leaflet-popup-content-wrapper{border-radius:14px!important;box-shadow:var(--shadow)!important;border:1px solid var(--border)!important}
    .leaflet-popup-tip-container{display:none}

    /* MAP BANNER */
    .map-banner{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:var(--green);color:white;padding:8px 18px;border-radius:100px;font-size:13px;font-weight:600;z-index:40;white-space:nowrap;box-shadow:0 2px 14px rgba(45,106,47,0.35);display:none;pointer-events:none}

    /* CARDS */
    .rest-card{background:var(--white);border-radius:var(--r);padding:14px;box-shadow:var(--shadow);display:flex;gap:12px;cursor:pointer;transition:transform 0.15s;position:relative;border:1px solid var(--border)}
    .rest-card:active{transform:scale(0.975)}
    .card-icon{width:50px;height:50px;border-radius:12px;background:var(--green-lt);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
    .card-body{flex:1;min-width:0}
    .card-name{font-size:15px;font-weight:800;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .card-r1{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap}
    .cat-badge{font-size:11px;font-weight:700;color:var(--green);background:var(--green-lt);padding:2px 8px;border-radius:100px;white-space:nowrap}
    .stars{font-size:12px;color:var(--yellow2)}
    .price-tag{font-size:11px;color:var(--muted)}
    .card-r2{font-size:12px;color:var(--muted);line-height:1.5}
    .card-quote{font-size:12px;color:var(--green);font-style:italic;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
    .card-fav{position:absolute;top:12px;right:12px;font-size:19px;border:none;background:none;cursor:pointer}
    .list-hdr{font-size:12px;color:var(--muted);padding:2px 2px 0;font-weight:500}
    .sort-bar{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:0 0 2px;flex-shrink:0}
    .sort-bar::-webkit-scrollbar{display:none}
    .sort-chip{flex-shrink:0;padding:5px 12px;border-radius:100px;border:1.5px solid var(--border);background:white;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;transition:all 0.18s;white-space:nowrap}
    .sort-chip.active{background:var(--green);border-color:var(--green);color:white;font-weight:700}
    .price-filter{display:flex;flex-direction:column;gap:6px;padding:6px 0 2px;flex-shrink:0}
    .price-filter-top{display:flex;justify-content:space-between;align-items:center}
    .price-filter-label{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:0.3px}
    .price-reset{font-size:11px;color:var(--green);cursor:pointer;background:none;border:none;font-family:inherit;font-weight:600;padding:0}
    .price-range-wrap{position:relative;height:22px;padding:0 2px}
    .price-range-track{position:absolute;top:50%;left:0;right:0;height:4px;background:var(--border);border-radius:2px;transform:translateY(-50%)}
    .price-range-fill{position:absolute;top:50%;height:4px;background:var(--green);border-radius:2px;transform:translateY(-50%)}
    .price-range-input{position:absolute;top:0;left:0;width:100%;height:22px;-webkit-appearance:none;appearance:none;background:none;pointer-events:none;margin:0;outline:none}
    .price-range-input::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--green);cursor:pointer;border:2px solid white;box-shadow:0 2px 5px rgba(0,0,0,0.25);pointer-events:auto;position:relative;z-index:2}
    .price-range-input::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--green);cursor:pointer;border:2px solid white;box-shadow:0 2px 5px rgba(0,0,0,0.25);pointer-events:auto}
    .price-inputs{display:flex;align-items:center;gap:8px}
    .price-input-box{flex:1;display:flex;align-items:center;gap:3px;padding:5px 8px;border:1.5px solid var(--border);border-radius:8px;background:white;min-width:0}
    .price-input-box:focus-within{border-color:var(--green)}
    .price-input-box label{font-size:10px;color:var(--muted);font-weight:600;white-space:nowrap}
    .price-input-box input{flex:1;border:none;font-size:13px;font-family:inherit;text-align:right;color:var(--text);outline:none;background:none;min-width:0;font-weight:600}
    .price-input-box span{font-size:11px;color:var(--muted)}
    .price-dash{color:var(--muted);font-size:14px}

    /* BOTTOM NAV */
    .bottom-nav{background:var(--white);border-top:1px solid var(--border);display:flex;flex-shrink:0;padding:6px 0 max(env(safe-area-inset-bottom),6px);position:relative;z-index:10}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px 0}
    .nav-icon{font-size:21px}
    .nav-label{font-size:10px;color:var(--muted);font-weight:500}
    .nav-item.active .nav-label{color:var(--green);font-weight:800}

    /* FAB */
    .fab-group{position:fixed;bottom:calc(max(env(safe-area-inset-bottom),6px) + 62px + 14px);right:16px;display:flex;flex-direction:column;align-items:center;gap:10px;z-index:100}
    .fab{width:54px;height:54px;background:var(--yellow);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 18px rgba(245,200,66,0.5);cursor:pointer;border:none;transition:transform 0.18s}
    .fab:active{transform:scale(0.88)}
    .fab-coffee{background:white;border:2.5px solid var(--green);box-shadow:0 4px 18px rgba(45,106,47,0.25)}
    /* Coffee picker modal */
    .coffee-box{background:var(--white);border-radius:24px;padding:28px 22px 24px;width:100%;max-width:340px;border:2px solid var(--border);animation:popIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275);max-height:85dvh;overflow-y:auto}
    .coffee-title{font-size:18px;font-weight:900;color:var(--green);margin-bottom:4px;text-align:center}
    .coffee-sub{font-size:12px;color:var(--muted);text-align:center;margin-bottom:16px}
    .coffee-names{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px}
    .coffee-name-wrap{position:relative}
    .coffee-name-input{width:100%;padding:8px 28px 8px 10px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:inherit;color:var(--text);background:var(--bg);outline:none;transition:border-color 0.2s}
    .coffee-name-input:focus{border-color:var(--green)}
    .coffee-name-input.winner{border-color:var(--green);background:var(--green-lt);font-weight:700;color:var(--green)}
    .coffee-name-del{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:13px;color:var(--muted);cursor:pointer;padding:2px}
    .coffee-add-btn{width:100%;padding:9px;border:1.5px dashed var(--border);border-radius:10px;background:none;font-size:13px;color:var(--muted);cursor:pointer;font-family:inherit;margin-bottom:12px}
    .coffee-result{text-align:center;padding:14px;background:var(--green-lt);border-radius:14px;margin-bottom:14px;display:none}
    .coffee-result-emoji{font-size:40px;display:block;margin-bottom:6px}
    .coffee-result-label{font-size:12px;color:var(--muted);margin-bottom:3px}
    .coffee-result-name{font-size:24px;font-weight:900;color:var(--green)}
    .coffee-btns{display:flex;gap:8px}

    /* PICKER */
    .overlay{position:fixed;inset:0;background:rgba(26,46,26,0.65);backdrop-filter:blur(8px);z-index:9999;display:none;align-items:center;justify-content:center;padding:28px}
    .overlay.show{display:flex}
    .picker-box{background:var(--white);border-radius:24px;padding:36px 24px 28px;text-align:center;width:100%;max-width:320px;border:2px solid var(--yellow);animation:popIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275)}
    @keyframes popIn{from{transform:scale(0.8);opacity:0}to{transform:scale(1);opacity:1}}
    .pk-emoji{font-size:62px;display:block;margin-bottom:10px}
    @keyframes wiggle{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}
    .pk-emoji.spin{animation:wiggle 0.35s ease-in-out}
    .pk-eyebrow{font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--green);text-transform:uppercase;margin-bottom:4px}
    .pk-name{font-size:24px;font-weight:900;color:var(--text);margin-bottom:4px;line-height:1.2}
    .pk-quote{font-size:14px;color:var(--green);font-style:italic;margin-bottom:6px;font-weight:500}
    .pk-info{font-size:13px;color:var(--muted);margin-bottom:22px;line-height:1.7}
    .pk-btns{display:flex;gap:8px}
    .btn-ol{flex:1;padding:13px;border:1.5px solid var(--border);border-radius:10px;background:none;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
    .btn-pr{flex:1;padding:13px;background:var(--green);border:none;border-radius:10px;color:white;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}

    /* DETAIL SHEET */
    .sheet-bg{position:fixed;inset:0;z-index:140;display:none}
    .sheet-bg.show{display:block}
    .bottom-sheet{position:fixed;bottom:-110%;left:0;right:0;background:var(--white);border-radius:22px 22px 0 0;padding:14px 20px;z-index:150;transition:bottom 0.35s cubic-bezier(0.32,0.72,0,1);max-height:82dvh;overflow-y:auto;padding-bottom:max(env(safe-area-inset-bottom),16px);border-top:3px solid var(--green)}
    .bottom-sheet.show{bottom:0}
    .sh-handle{width:32px;height:3px;background:var(--border);border-radius:2px;margin:0 auto 16px}
    .sh-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
    .sh-name{font-size:22px;font-weight:900;color:var(--text);line-height:1.2;margin-bottom:6px}
    .sh-badges{display:flex;align-items:center;gap:8px}
    .sh-quote{font-size:14px;color:var(--green);font-style:italic;margin-bottom:12px;padding:9px 14px;background:var(--green-lt);border-radius:10px;border-left:3px solid var(--green);font-weight:500;line-height:1.5}
    .sh-rating{font-size:16px;font-weight:800;color:var(--yellow2)}
    .sh-fav{font-size:24px;border:none;background:none;cursor:pointer}
    .detail-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border);gap:12px}
    .dl{color:var(--muted);font-weight:500;flex-shrink:0;font-size:12px}
    .dv{font-weight:600;text-align:right;flex:1;line-height:1.5;font-size:13.5px}
    .sh-actions{display:flex;gap:8px;margin-top:16px}
    .sh-btn-ol{flex:1;padding:13px;border:1.5px solid var(--border);border-radius:10px;background:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
    .sh-btn-pr{flex:1;padding:13px;background:var(--green);border:none;border-radius:10px;color:white;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}

    /* EMPTY */
    .empty{text-align:center;padding:52px 24px;color:var(--muted)}
    .empty-icon{font-size:44px;display:block;margin-bottom:10px}
    .empty-t{font-size:17px;font-weight:800;color:var(--green)}
    .empty-s{font-size:13px;margin-top:5px}
  </style>
</head>
<body>



<!-- SPLASH -->
<div class="splash" id="splash">
  <div class="splash-icon">📍</div>
  <div class="splash-title">을지맛지도</div>
  <div class="splash-sub">오늘 점심 뭐 먹지?</div>
  <div class="splash-bar"><div class="splash-prog"></div></div>
</div>

<!-- HEADER -->
<div class="header" id="hdr">
  <div class="hdr-top">
    <div class="hdr-logo">
      <div class="hdr-icon">😊</div>
      <span class="hdr-title">을지맛지도</span>
      <span class="hdr-count" id="hdr-count"></span>
    </div>
    <button class="hdr-btn" id="admin-btn" onclick="openAdmin()" style="display:none">⚙️</button>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search-input" type="text" placeholder="식당명, 메뉴 검색...">
    <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
  </div>
  <!-- 초기화 버튼 -->
  <div class="filter-reset-row">
    <button class="filter-reset-btn" onclick="resetAllFilters()">↻ 선택 초기화</button>
  </div>
  <!-- 운영시간대 필터 (택1) -->
  <div class="filter-row" id="time-filter"></div>
  <!-- 카테고리 필터 (복수선택) -->
  <div class="filter-row" id="cat-filter"></div>
  <!-- 분위기 필터 (복수선택) -->
  <div class="filter-row" id="mood-filter"></div>
</div>

<!-- MAIN -->
<div class="main" id="main">
  <div id="map-view">
    <div id="leaflet-map"></div>
    <div class="map-banner" id="map-banner">📍 지도에서 위치를 탭해주세요</div>
  </div>
  <div id="list-view"></div>
  <div id="fav-view"></div>


  <!-- ADD RESTAURANT FORM -->
<div class="overlay" id="add-overlay" onclick="if(event.target===this)closeAddForm()">
  <div class="coffee-box" style="max-width:400px;padding:24px 22px">
    <div class="coffee-title">➕ 식당 추가</div>
    <div class="coffee-sub">작성 후 JSON을 복사해서 관리자에게 전달하세요</div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
      <div>
        <label class="admin-label">식당명 *</label>
        <input class="admin-input" id="af-name" placeholder="예: 콘부">
      </div>
      <div>

<script>
// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
function renderStars(rating){
  const r = parseFloat(rating) || 0;
  const full = Math.floor(r);
  const half = (r - full) >= 0.5;
  let s = '★'.repeat(full);
  if(half) s += '☆';  // half star indicator
  return s;
}
const CAT_EMOJI = {'한식':'🍚','양식':'🍝','중식':'🥢','일식':'🍣','아시안':'🌏','분식':'🥙','패스트푸드':'🍔','카페/디저트':'☕','샐러드/건강식':'🥗','기타':'🍽️'};
const emo = c => CAT_EMOJI[c] || '🍽️';

let restaurants = []; // loaded from data.json
let curCat = '전체', curView = 'map';
let favs = new Set(), locs = {};
let leafMap = null, markers = [], locMode = false, locTarget = null, curSheet = null;
let titleTaps = 0, titleTimer = null;

(()=>{
  const l = localStorage.getItem('lm5_locs'); if(l) locs = JSON.parse(l);
  const f = localStorage.getItem('lm5_favs'); if(f) favs = new Set(JSON.parse(f));
})();

// Load restaurant data from external JSON
async function loadRestaurants(){
  try {
    // Add cache-busting param so updates show immediately
    const res = await fetch('./data.json?v=' + Date.now());
    if(!res.ok) throw new Error('data.json 로드 실패');
    const data = await res.json();
    restaurants = data.map((r,i) => ({...r, id:String(i)}));
    restaurants.forEach(r => {
      if(r.위도 && r.경도 && !locs[r.id])
        locs[r.id] = {lat: parseFloat(r.위도), lng: parseFloat(r.경도)};
    });
    return true;
  } catch(e) {
    console.error('식당 데이터 로드 실패:', e);
    alert('식당 데이터를 불러오지 못했어요. data.json 파일을 확인해주세요.');
    return false;
  }
}

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
window.addEventListener('DOMContentLoaded', async () => {
  await loadRestaurants();
  document.querySelector('.hdr-title').addEventListener('click', () => {
    titleTaps++; clearTimeout(titleTimer);
    titleTimer = setTimeout(()=>titleTaps=0, 1000);
    if(titleTaps >= 3){ titleTaps=0; activateAdmin(); }
  });

  // Search
  const sinput = document.getElementById('search-input');
  const sclear = document.getElementById('search-clear');
  sinput.addEventListener('input', e=>{
    searchQuery = e.target.value.trim();
    sclear.style.display = searchQuery ? 'block' : 'none';
    applySearch();
  });

  function applySearch(){
    minPrice=0; maxPrice=0;
    if(curView==='map' && searchQuery) switchView('list');
    applyAllFilters();
  }

  setTimeout(() => {
    document.getElementById('splash').classList.add('hide');
    buildTimeFilter(); buildMoodFilter(); buildChips(); applyAllFilters();
    document.getElementById('hdr-count').textContent = `· ${restaurants.length}곳`;
    initMap();
  }, 1500);
});

function activateAdmin(){
  document.getElementById('admin-btn').style.display = 'flex';
  document.getElementById('sh-loc-btn').style.display = 'flex';
  showToast('관리자 모드 ⚙️');
}

// ══════════════════════════════════════
// LEAFLET MAP
// ══════════════════════════════════════
function initMap(){
  if(typeof kakao === 'undefined' || !kakao.maps) {
    console.error('Kakao Maps SDK not loaded');
    return;
  }
  kakao.maps.load(() => {
    const center = Object.values(locs)[0] || {lat:37.5665, lng:126.9780};
    const container = document.getElementById('leaflet-map');
    leafMap = new kakao.maps.Map(container, {
      center: new kakao.maps.LatLng(center.lat, center.lng),
      level: 4
    });

    // Click handler for location-set mode
    kakao.maps.event.addListener(leafMap, 'click', function(mouseEvent) {
      if(!locMode || !locTarget) return;
      const latlng = mouseEvent.latLng;
      locs[locTarget.id] = {lat: latlng.getLat(), lng: latlng.getLng()};
      localStorage.setItem('lm5_locs', JSON.stringify(locs));
      locMode = false; locTarget = null;
      document.getElementById('map-banner').style.display = 'none';
      renderMarkers(); showToast('위치 저장 ✅');
    });

    renderMarkers();
  });
}

function renderMarkers(customList){
  // Clear existing markers
  markers.forEach(m => m.setMap(null));
  markers = [];
  if(!leafMap) return;

  const list = customList || (curCat==='전체' ? restaurants : restaurants.filter(r=>r.카테고리===curCat));

  list.forEach(r => {
    const loc = locs[r.id]; if(!loc) return;
    // Create custom HTML overlay (말풍선 핀)
    const html = `<div class="map-pin"><span class="pin-emoji">${emo(r.카테고리)}</span><span class="pin-name">${r.이름}</span><span class="pin-stars">${renderStars(r.별점)}</span></div>`;
    const overlay = new kakao.maps.CustomOverlay({
      position: new kakao.maps.LatLng(loc.lat, loc.lng),
      content: html,
      yAnchor: 1.0,  // 말풍선 꼬리가 위치를 가리키도록
      xAnchor: 0.5,
      clickable: true
    });
    overlay.setMap(leafMap);

    // Need click on the rendered DOM node — Kakao CustomOverlay doesn't natively support click, so we attach via timeout
    setTimeout(() => {
      const els = document.querySelectorAll('.map-pin');
      els.forEach(el => {
        const nameSpan = el.querySelector('.pin-name');
        if(nameSpan && nameSpan.textContent === r.이름 && !el._bound) {
          el._bound = true;
          el.style.cursor = 'pointer';
          el.addEventListener('click', () => openSheet(r));
        }
      });
    }, 100);

    markers.push(overlay);
  });
}

// ══════════════════════════════════════
// FILTER & RENDER
// ══════════════════════════════════════
function buildChips(){
  const bar = document.getElementById('cat-filter'); if(!bar) return;
  bar.innerHTML='';
  const label = document.createElement('span');
  label.className = 'filter-row-label';
  label.innerHTML = '🍽️ 카테고리';
  bar.appendChild(label);

  // "전체" 칩 (다른 거 아무것도 선택 안 되었을 때만 활성)
  const allBtn = document.createElement('button');
  allBtn.className = 'mood-chip-btn' + (selectedCats.size===0 ? ' active' : '');
  allBtn.textContent = '전체';
  allBtn.onclick = ()=>{
    selectedCats.clear();
    buildChips(); applyAllFilters();
  };
  bar.appendChild(allBtn);

  // 카테고리별 칩
  CAT_OPTIONS.forEach(cat=>{
    const btn = document.createElement('button');
    btn.className = 'mood-chip-btn' + (selectedCats.has(cat) ? ' active' : '');
    btn.textContent = `${emo(cat)} ${cat}`;
    btn.onclick = ()=>{
      if(selectedCats.has(cat)) selectedCats.delete(cat);
      else selectedCats.add(cat);
      buildChips(); applyAllFilters();
    };
    bar.appendChild(btn);
  });
}

function filterCat(cat,el){
  // 복수선택 카테고리로 바뀌어서 더이상 사용 안 함 (호환성 유지용)
  minPrice=0; maxPrice=0;
  applyAllFilters();
}

function resetAllFilters(){
  curTime = '전체';
  selectedCats.clear();
  selectedMoods.clear();
  searchQuery = '';
  minPrice = 0; maxPrice = 0;
  const si = document.getElementById('search-input');
  if(si) si.value='';
  const sc = document.getElementById('search-clear');
  if(sc) sc.style.display='none';
  buildTimeFilter();
  buildChips();
  buildMoodFilter();
  applyAllFilters();
  showToast('필터 초기화 완료 ↻');
}

function buildTimeFilter(){
  const bar = document.getElementById('time-filter'); if(!bar) return;
  bar.innerHTML='';
  const label = document.createElement('span');
  label.className = 'filter-row-label'; 
  label.innerHTML = '⏰ 운영시간';
  bar.appendChild(label);
  TIME_OPTIONS.forEach(t=>{
    const d=document.createElement('div');
    d.className='chip'+(t===curTime?' active':'');
    d.textContent=t;
    d.onclick=()=>{ curTime=t; buildTimeFilter(); applyAllFilters(); };
    bar.appendChild(d);
  });
}

function buildMoodFilter(){
  const bar = document.getElementById('mood-filter'); if(!bar) return;
  bar.innerHTML='';
  const label = document.createElement('span');
  label.className = 'filter-row-label';
  label.innerHTML = '🎭 분위기';
  bar.appendChild(label);

  // "전체" 칩 (분위기 아무것도 선택 안 된 상태가 기본)
  const allBtn = document.createElement('button');
  allBtn.className = 'mood-chip-btn' + (selectedMoods.size===0 ? ' active' : '');
  allBtn.textContent = '전체';
  allBtn.onclick = ()=>{
    selectedMoods.clear();
    buildMoodFilter(); applyAllFilters();
  };
  bar.appendChild(allBtn);

  MOOD_OPTIONS.forEach(m=>{
    const btn=document.createElement('button');
    btn.className='mood-chip-btn'+(selectedMoods.has(m)?' active':'');
    btn.textContent=m;
    btn.onclick=()=>{
      if(selectedMoods.has(m)) selectedMoods.delete(m);
      else selectedMoods.add(m);
      buildMoodFilter(); applyAllFilters();
    };
    bar.appendChild(btn);
  });
}

function applyAllFilters(){
  const sq = searchQuery||'';
  const filtered = restaurants.filter(r=>{
    // 카테고리 필터 (복수 OR)
    if(selectedCats.size > 0 && !selectedCats.has(r.카테고리)) return false;
    // 운영시간대: 배열. 전체(필터X) / 점심(배열에 '점심' 포함) / 저녁(배열에 '저녁' 포함)
    if(curTime !== '전체') {
      const rt = Array.isArray(r.운영시간대) ? r.운영시간대 : (r.운영시간대 ? [r.운영시간대] : ['점심','저녁']);
      if(!rt.includes(curTime)) return false;
    }
    // 분위기 (복수 OR)
    if(selectedMoods.size > 0) {
      const rMoods = Array.isArray(r.분위기) ? r.분위기 : [];
      if(![...selectedMoods].some(m => rMoods.includes(m))) return false;
    }
    // 검색어
    if(sq && !(r.이름+r.메뉴+r.한줄평+(r.비고||'')).includes(sq)) return false;
    return true;
  });
  renderList(filtered);
  renderMarkers(filtered);
}

let curSort = 'rating';
function recCount(r){
  const s = (r.추천인||'').toString().replace(/외\s*\d+명/g,'').trim();
  if(!s) return 0;
  return s.split(/[,、]/).map(x=>x.trim()).filter(Boolean).length;
}
const SORTS = [
  {key:'rating',     label:'⭐ 별점순',        fn:(a,b)=>(parseFloat(b.별점)||0)-(parseFloat(a.별점)||0)},
  {key:'price_asc',  label:'💰 가격 낮은순',   fn:(a,b)=>{const d=priceNum(a.가격)-priceNum(b.가격);return d!==0?d:a.이름.localeCompare(b.이름,'ko');}},
  {key:'price_desc', label:'💸 가격 높은순',   fn:(a,b)=>{const d=priceNum(b.가격)-priceNum(a.가격);return d!==0?d:a.이름.localeCompare(b.이름,'ko');}},
  {key:'rec',        label:'👥 추천인 많은순', fn:(a,b)=>recCount(b)-recCount(a)},
];
let minPrice = 0;
let maxPrice = 0; // 0 = no filter (show all)
let searchQuery = '';
let curTime = '전체';  // 운영시간대 기본: 전체
let selectedCats = new Set();   // 카테고리 복수선택 (빈 Set = 전체)
let selectedMoods = new Set();  // 분위기 복수선택 (빈 Set = 전체)
const TIME_OPTIONS = ['전체', '점심', '저녁'];
const CAT_OPTIONS = ['한식','양식','중식','일식','아시안','분식','패스트푸드','카페/디저트','샐러드/건강식','기타'];
const MOOD_OPTIONS = ['팀런치', '업무미팅', '혼밥', '단체회식', '소규모'];

function priceNum(p){
  if(!p)return 99999;
  const m=p.replace(/[^0-9]/g,'');
  return m?parseInt(m):99999;
}
function buildSortBar(){
  // injected at top of renderList now
}
function renderList(list){
  const lv = document.getElementById('list-view'); lv.innerHTML='';
  if(!list?.length){lv.innerHTML=`<div class="empty"><span class="empty-icon">🍽️</span><div class="empty-t">식당이 없어요</div></div>`;return;}

  // Sort bar
  const sortWrap = document.createElement('div');
  sortWrap.className = 'sort-bar';
  SORTS.forEach(s=>{
    const d=document.createElement('div');
    d.className='sort-chip'+(s.key===curSort?' active':'');
    d.textContent=s.label;
    d.onclick=()=>{curSort=s.key;const curList=curCat==='전체'?restaurants:restaurants.filter(r=>r.카테고리===curCat);renderList(curList);};
    sortWrap.appendChild(d);
  });
  lv.appendChild(sortWrap);

  // Price range filter (Airbnb style)
  const prices = list.map(r=>priceNum(r.가격)).filter(p=>p<99999);
  const dataMin = prices.length ? Math.min(...prices) : 0;
  const dataMax = prices.length ? Math.max(...prices) : 30000;
  const ABS_MIN = 0;
  const ABS_MAX = Math.max(dataMax, 50000);
  if(maxPrice===0) { minPrice=ABS_MIN; maxPrice=ABS_MAX; }

  const pfWrap = document.createElement('div');
  pfWrap.className='price-filter';
  pfWrap.innerHTML=`
    <div class="price-filter-top">
      <span class="price-filter-label">💰 가격 범위</span>
      <button class="price-reset" type="button">초기화</button>
    </div>
    <div class="price-range-wrap">
      <div class="price-range-track"></div>
      <div class="price-range-fill"></div>
      <input type="range" class="price-range-input" id="pr-min" min="${ABS_MIN}" max="${ABS_MAX}" step="1000" value="${minPrice}">
      <input type="range" class="price-range-input" id="pr-max" min="${ABS_MIN}" max="${ABS_MAX}" step="1000" value="${maxPrice}">
    </div>
    <div class="price-inputs">
      <div class="price-input-box">
        <label>최소</label>
        <input type="number" id="pi-min" value="${minPrice}" min="0" step="1000">
        <span>원</span>
      </div>
      <span class="price-dash">~</span>
      <div class="price-input-box">
        <label>최대</label>
        <input type="number" id="pi-max" value="${maxPrice}" min="0" step="1000">
        <span>원</span>
      </div>
    </div>
  `;
  lv.appendChild(pfWrap);

  const rMin=pfWrap.querySelector('#pr-min');
  const rMax=pfWrap.querySelector('#pr-max');
  const iMin=pfWrap.querySelector('#pi-min');
  const iMax=pfWrap.querySelector('#pi-max');
  const fill=pfWrap.querySelector('.price-range-fill');
  const resetBtn=pfWrap.querySelector('.price-reset');

  function updateFill(){
    const totalRange = ABS_MAX-ABS_MIN;
    const leftPct = totalRange>0 ? ((minPrice-ABS_MIN)/totalRange)*100 : 0;
    const rightPct = totalRange>0 ? ((maxPrice-ABS_MIN)/totalRange)*100 : 100;
    fill.style.left = leftPct+'%';
    fill.style.width = (rightPct-leftPct)+'%';
  }

  function rerenderCards(){
    const base=curCat==='전체'?restaurants:restaurants.filter(r=>r.카테고리===curCat);
    const sq=searchQuery||'';
    const curList=base.filter(r=>{
      const p=priceNum(r.가격);
      if(p>=99999) return minPrice===ABS_MIN; // unpriced shown only when min=0
      return p>=minPrice && p<=maxPrice;
    }).filter(r=>!sq||(r.이름+r.메뉴+r.한줄평).includes(sq));
    const sortObj2=SORTS.find(s=>s.key===curSort)||SORTS[0];
    const sorted2=[...curList].sort(sortObj2.fn);
    while(lv.lastChild!==pfWrap)lv.removeChild(lv.lastChild);
    const hdr=document.createElement('div');hdr.className='list-hdr';
    hdr.textContent=`${sorted2.length}곳`;lv.appendChild(hdr);
    sorted2.forEach(r=>lv.appendChild(makeCard(r)));
    renderFavs();
  }

  function syncAll(){
    rMin.value=minPrice; rMax.value=maxPrice;
    iMin.value=minPrice; iMax.value=maxPrice;
    updateFill();
    rerenderCards();
  }

  rMin.addEventListener('input',e=>{
    let v=parseInt(e.target.value);
    if(v>maxPrice-1000) v=Math.max(ABS_MIN, maxPrice-1000);
    minPrice=v; syncAll();
  });
  rMax.addEventListener('input',e=>{
    let v=parseInt(e.target.value);
    if(v<minPrice+1000) v=Math.min(ABS_MAX, minPrice+1000);
    maxPrice=v; syncAll();
  });
  iMin.addEventListener('change',e=>{
    let v=parseInt(e.target.value)||ABS_MIN;
    v=Math.max(ABS_MIN,Math.min(v,maxPrice-1000));
    minPrice=v; syncAll();
  });
  iMax.addEventListener('change',e=>{
    let v=parseInt(e.target.value)||ABS_MAX;
    v=Math.max(minPrice+1000,Math.min(v,ABS_MAX));
    maxPrice=v; syncAll();
  });
  resetBtn.addEventListener('click',()=>{
    minPrice=ABS_MIN; maxPrice=ABS_MAX; syncAll();
  });

  updateFill();

  const filteredList = list.filter(r=>{
    const p=priceNum(r.가격);
    if(p>=99999) return minPrice===ABS_MIN;
    return p>=minPrice && p<=maxPrice;
  });
  const sortObj = SORTS.find(s=>s.key===curSort)||SORTS[0];
  const sorted = [...filteredList].sort(sortObj.fn);
  lv.appendChild(Object.assign(document.createElement('div'),{className:'list-hdr',textContent:`${sorted.length}곳`}));
  sorted.forEach(r=>lv.appendChild(makeCard(r)));
  renderFavs();
}

function makeCard(r){
  const el = document.createElement('div'); el.className='rest-card';
  el.innerHTML=`
    <div class="card-icon">${emo(r.카테고리)}</div>
    <div class="card-body">
      <div class="card-name">${r.이름}</div>
      <div class="card-r1">
        <span class="cat-badge">${r.카테고리}</span>
        <span class="stars">${renderStars(r.별점)}</span>
        ${r.가격?`<span class="price-tag">${r.가격}</span>`:''}
      </div>
      <div class="card-r2" style="display:flex;flex-wrap:wrap;gap:3px;align-items:center">
        ${(Array.isArray(r.운영시간대) ? r.운영시간대 : [r.운영시간대]).map(t => t==='점심' ? '<span class="time-tag">🌞 점심</span>' : (t==='저녁' ? '<span class="time-tag">🌙 저녁</span>' : '')).join('')}
        ${(r.분위기||[]).slice(0,3).map(m=>`<span class="mood-tag">${m}</span>`).join('')}
      </div>
      ${r.메뉴?`<div class="card-r2" style="margin-top:2px">🍽 ${r.메뉴}</div>`:''}
      ${r.추천인?`<div class="card-r2" style="margin-top:2px">👤 추천인 : ${r.추천인}</div>`:''}
      ${r.한줄평?`<div class="card-quote">"${r.한줄평}"</div>`:''}
    </div>
    <button class="card-fav" data-id="${r.id}">${favs.has(r.id)?'⭐':'🤍'}</button>`;
  el.querySelector('.card-fav').addEventListener('click',e=>{e.stopPropagation();toggleFav(r.id,el.querySelector('.card-fav'));});
  el.addEventListener('click',()=>openSheet(r));
  return el;
}

function renderFavs(){
  const fv = document.getElementById('fav-view'); fv.innerHTML='';
  const list = restaurants.filter(r=>favs.has(r.id));
  if(!list.length){fv.innerHTML=`<div class="empty"><span class="empty-icon">🤍</span><div class="empty-t">즐겨찾기가 없어요</div><div class="empty-s">목록에서 하트를 눌러 추가하세요</div></div>`;return;}
  list.forEach(r=>fv.appendChild(makeCard(r)));
}

// ══════════════════════════════════════
// FAVORITES
// ══════════════════════════════════════
function toggleFav(id,btn){
  favs.has(id)?favs.delete(id):favs.add(id);
  if(btn) btn.textContent = favs.has(id)?'⭐':'🤍';
  localStorage.setItem('lm5_favs', JSON.stringify([...favs]));
  renderFavs();
}
function toggleFavSheet(){
  if(!curSheet)return;
  toggleFav(curSheet.id,null);
  document.getElementById('sh-fav').textContent = favs.has(curSheet.id)?'⭐':'🤍';
  document.querySelectorAll('.card-fav').forEach(b=>{if(b.dataset.id===curSheet.id)b.textContent=favs.has(curSheet.id)?'⭐':'🤍';});
}

// ══════════════════════════════════════
// DETAIL SHEET
// ══════════════════════════════════════
function openSheet(r){
  curSheet=r;
  document.getElementById('sh-name').textContent=r.이름;
  document.getElementById('sh-cat').textContent=`${emo(r.카테고리)} ${r.카테고리}`;
  document.getElementById('sh-stars').textContent='★'.repeat(r.별점||0);
  document.getElementById('sh-fav').textContent=favs.has(r.id)?'⭐':'🤍';
  const qEl=document.getElementById('sh-quote');
  if(r.한줄평){qEl.textContent=`"${r.한줄평}"`;qEl.style.display='block';}else qEl.style.display='none';
  const rows=document.getElementById('sh-rows'); rows.innerHTML='';
  [['🍽️ 메뉴',r.메뉴],['💰 가격대',r.가격],['👤 추천인',r.추천인],['📝 비고',r.비고],
   ['📍 위치',locs[r.id]?'등록됨 ✅':'미등록']
  ].forEach(([l,v])=>{
    if(!v)return;
    const row=document.createElement('div'); row.className='detail-row';
    row.innerHTML=`<span class="dl">${l}</span><span class="dv">${v}</span>`;
    rows.appendChild(row);
  });
  document.getElementById('detail-sheet').classList.add('show');
  document.getElementById('sheet-bg').classList.add('show');
}
function closeSheet(){
  document.getElementById('detail-sheet').classList.remove('show');
  document.getElementById('sheet-bg').classList.remove('show');
}
function setLocMode(){
  if(!curSheet)return; locMode=true; locTarget=curSheet; closeSheet();
  switchView('map'); document.getElementById('map-banner').style.display='block';
}
function flyToPin(){
  if(!curSheet)return;
  const loc=locs[curSheet.id];
  if(!loc){showToast('위치가 설정되지 않았어요. 네이버/카카오맵 버튼을 이용하세요');return;}
  closeSheet(); switchView('map');
  if(leafMap){ leafMap.setLevel(2); leafMap.panTo(new kakao.maps.LatLng(loc.lat, loc.lng)); }
}

function openNaverMap(){
  if(!curSheet)return;
  const q = encodeURIComponent(curSheet.이름);
  // Naver Map universal search URL (works on web & redirects to app on mobile)
  window.open(`https://map.naver.com/p/search/${q}`,'_blank');
}

function openKakaoMap(){
  if(!curSheet)return;
  const q = encodeURIComponent(curSheet.이름);
  window.open(`https://map.kakao.com/link/search/${q}`,'_blank');
}

// ══════════════════════════════════════
// RANDOM PICKER
// ══════════════════════════════════════
function randomPick(){
  const pool=curCat==='전체'?restaurants:restaurants.filter(r=>r.카테고리===curCat);
  if(!pool.length){showToast('식당이 없어요 😅');return;}
  const r=pool[Math.floor(Math.random()*pool.length)];
  const ej=document.getElementById('pk-emoji');
  ej.textContent=emo(r.카테고리);
  ej.classList.remove('spin');
  requestAnimationFrame(()=>requestAnimationFrame(()=>ej.classList.add('spin')));
  ej.addEventListener('animationend',()=>ej.classList.remove('spin'),{once:true});
  document.getElementById('pk-name').textContent=r.이름;
  const qEl=document.getElementById('pk-quote');
  if(r.한줄평){qEl.textContent=`"${r.한줄평}"`;qEl.style.display='block';}else qEl.style.display='none';
  document.getElementById('pk-info').textContent=[r.메뉴&&`🍽 ${r.메뉴}`,r.가격&&`💰 ${r.가격}`,r.추천인&&`👤 ${r.추천인}추천`].filter(Boolean).join('  ·  ');
  document.getElementById('picker-overlay').classList.add('show');
}
function closePicker(){document.getElementById('picker-overlay').classList.remove('show');}

// ══════════════════════════════════════
// VIEW SWITCH
// ══════════════════════════════════════
function switchView(view){
  // 탭 전환 시 모든 오버레이/시트 자동 닫기
  document.querySelectorAll('.overlay').forEach(o=>o.classList.remove('show'));
  closeSheet();

  curView=view;
  document.getElementById('map-view').style.display=view==='map'?'block':'none';
  document.getElementById('list-view').classList.toggle('active',view==='list');
  document.getElementById('fav-view').classList.toggle('active',view==='fav');
  ['map','list','fav'].forEach(v=>document.getElementById(`nav-${v}`).classList.toggle('active',v===view));

  if(view==='map'&&leafMap) setTimeout(()=>leafMap.relayout(),100);
}

// ADMIN
// ══════════════════════════════════════
function clearSearch(){
  searchQuery='';
  document.getElementById('search-input').value='';
  document.getElementById('search-clear').style.display='none';
  minPrice=0; maxPrice=0;
  applyAllFilters();
}

function openAdmin(){document.getElementById('admin-panel').classList.add('show');}
function closeAdmin(){document.getElementById('admin-panel').classList.remove('show');}
function exportLocs(){
  navigator.clipboard.writeText(JSON.stringify(locs,null,2))
    .then(()=>showToast('복사됨 ✅'))
    .catch(()=>alert(JSON.stringify(locs,null,2)));
}
function importLocsPrompt(){
  const input=prompt('위치 JSON 붙여넣기:');
  if(!input)return;
  try{locs=JSON.parse(input);localStorage.setItem('lm5_locs',JSON.stringify(locs));renderMarkers();showToast('가져오기 완료 ✅');}
  catch{showToast('형식 오류 ❌');}
}

function openAddForm(){
  ['af-name','af-menu','af-rec','af-review','af-note','af-price'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.value='';
  });
  document.getElementById('af-rating').value='4';
  document.getElementById('af-cat').value='한식';
  document.getElementById('af-output').style.display='none';
  document.getElementById('add-overlay').classList.add('show');
}
function closeAddForm(){document.getElementById('add-overlay').classList.remove('show');}

function generateJSON(){
  const v=id=>document.getElementById(id).value.trim();
  const name=v('af-name');
  if(!name){showToast('식당명을 입력해주세요');return;}

  const price=v('af-price');
  const priceStr=price?`${parseInt(price).toLocaleString()}원`:'';

  const obj={
    이름:name,
    카테고리:v('af-cat'),
    별점:parseInt(v('af-rating'))||4,
    메뉴:v('af-menu'),
    가격:priceStr,
    추천인:v('af-rec'),
    한줄평:v('af-review'),
    비고:v('af-note'),
    위도:"",
    경도:"",
  };

  const json=JSON.stringify(obj,null,2).replace(/"([^"]+)":/g,'$1:')+',';
  document.getElementById('af-json').value=json;
  document.getElementById('af-output').style.display='block';
  setTimeout(()=>document.getElementById('af-json').scrollIntoView({behavior:'smooth',block:'center'}),100);
}

function copyJSON(){
  const ta=document.getElementById('af-json');
  ta.select();
  navigator.clipboard.writeText(ta.value)
    .then(()=>showToast('복사됨! 관리자에게 전달하세요 ✅'))
    .catch(()=>{document.execCommand('copy');showToast('복사됨 ✅');});
}

// ══════════════════════════════════════
// COFFEE PICKER
// ══════════════════════════════════════
const MAX_NAMES = 15;
let coffeeNames = JSON.parse(localStorage.getItem('lm5_coffee')||'[]');

function saveCoffeeNames(){
  localStorage.setItem('lm5_coffee', JSON.stringify(coffeeNames));
}

function renderCoffeeNames(){
  const wrap = document.getElementById('coffee-names');
  wrap.innerHTML='';
  coffeeNames.forEach((name,i)=>{
    const div=document.createElement('div');
    div.className='coffee-name-wrap';
    const inp=document.createElement('input');
    inp.type='text';inp.className='coffee-name-input';
    inp.placeholder=`이름 ${i+1}`;inp.value=name;inp.maxLength=8;
    inp.addEventListener('input',e=>{coffeeNames[i]=e.target.value.trim();saveCoffeeNames();});
    const del=document.createElement('button');
    del.className='coffee-name-del';del.textContent='✕';
    del.onclick=()=>{coffeeNames.splice(i,1);saveCoffeeNames();renderCoffeeNames();};
    div.appendChild(inp);div.appendChild(del);
    wrap.appendChild(div);
  });
  document.getElementById('coffee-add-btn').style.display=
    coffeeNames.length>=MAX_NAMES?'none':'block';
}

function addCoffeeName(){
  if(coffeeNames.length>=MAX_NAMES)return;
  coffeeNames.push('');
  saveCoffeeNames();
  renderCoffeeNames();
  // focus last input
  const inputs=document.querySelectorAll('.coffee-name-input');
  if(inputs.length)inputs[inputs.length-1].focus();
}

function resetCoffeeNames(){
  if(!confirm('이름 목록을 초기화할까요?'))return;
  coffeeNames=['','',''];
  saveCoffeeNames();
  renderCoffeeNames();
  document.getElementById('coffee-result').style.display='none';
}

function openCoffee(){
  // If no names saved yet, add 3 empty slots
  if(coffeeNames.length===0) coffeeNames=['','',''];
  renderCoffeeNames();
  document.getElementById('coffee-result').style.display='none';
  document.querySelectorAll('.coffee-name-input').forEach(i=>i.classList.remove('winner'));
  document.getElementById('coffee-overlay').classList.add('show');
}
function closeCoffee(){document.getElementById('coffee-overlay').classList.remove('show');}

function spinCoffee(){
  const active = coffeeNames.filter(n=>n.trim());
  if(active.length<2){showToast('이름을 2명 이상 입력해주세요 😅');return;}

  // Shuffle animation
  const resultEl=document.getElementById('coffee-result');
  const nameEl=document.getElementById('coffee-result-name');
  const emojiEl=document.getElementById('coffee-result-emoji');
  resultEl.style.display='block';
  document.querySelectorAll('.coffee-name-input').forEach(i=>i.classList.remove('winner'));

  let count=0;const total=18;
  const interval=setInterval(()=>{
    const rand=active[Math.floor(Math.random()*active.length)];
    nameEl.textContent=rand;
    emojiEl.textContent=['☕','🍵','🧋','☕','☕'][Math.floor(Math.random()*5)];
    count++;
    if(count>=total){
      clearInterval(interval);
      // Final pick
      const winner=active[Math.floor(Math.random()*active.length)];
      nameEl.textContent=winner+' 님!';
      emojiEl.textContent='🎉';
      // Highlight winner input
      document.querySelectorAll('.coffee-name-input').forEach(inp=>{
        if(inp.value===winner)inp.classList.add('winner');
      });
    }
  }, count<10?80:120);
}

function showToast(msg){
  let t=document.getElementById('_toast');
  if(!t){t=document.createElement('div');t.id='_toast';Object.assign(t.style,{position:'fixed',bottom:'90px',left:'50%',transform:'translateX(-50%)',background:'rgba(26,46,26,0.92)',color:'white',padding:'10px 18px',borderRadius:'100px',fontSize:'13px',fontWeight:'600',zIndex:'400',whiteSpace:'nowrap',transition:'opacity 0.3s',fontFamily:"'Noto Sans KR',sans-serif"});document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity='0',2500);
}
